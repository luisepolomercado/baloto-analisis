name: Actualizar datos y desplegar
# Baloto · scraper + deploy a Pages (cron mar/jue/dom)

on:
  schedule:
    # Sorteos: lun/mié/sáb ~23:00 hora Colombia (UTC-5). Raspamos la mañana siguiente (UTC).
    - cron: "0 12 * * 2,4,0"   # mar, jue, dom — 12:00 UTC (07:00 Colombia)
  workflow_dispatch: {}          # permite ejecutarlo manualmente

permissions:
  contents: write   # para commitear el JSON actualizado
  pages: write      # para desplegar GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Raspar resultados del Baloto
        run: python scrape_baloto.py

      - name: Commit de datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados.json baloto_resultados.csv
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "chore: actualizar resultados Baloto ($(date -u +%F))"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
